apiVersion: v1
kind: ConfigMap
metadata:
  name: quix-streams-service-config
  namespace: airflow
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka.default.svc.cluster.local:9092"
  KAFKA_INPUT_TOPIC: "image-uploads"
  KAFKA_OUTPUT_TOPIC: "image-uploads-processed"
  KAFKA_CONSUMER_GROUP: "quix-image-processor"
  KAFKA_AUTO_OFFSET_RESET: "latest"
  LOG_LEVEL: "INFO"

  # Quix commit/checkpoint tuning
  QUIX_COMMIT_INTERVAL: "5.0"
  QUIX_PROCESSING_GUARANTEE: "at-least-once"

  # Enable/disable sinks
  ENABLE_POSTGRES_SINK: "true"
  ENABLE_ICEBERG_SINK: "true"

  # PostgreSQL sink
  POSTGRES_HOST: "postgres-postgresql.default.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "postgres"
  POSTGRES_USER: "postgres"
  POSTGRES_TABLE: "image_uploads_processed"

  # Iceberg sink (Lakekeeper REST catalog)
  ICEBERG_CATALOG_URI: "http://iceberg-rest.default.svc.cluster.local:8181/catalog"
  ICEBERG_NAMESPACE: "default"
  ICEBERG_TABLE: "image_uploads_processed"
  # Lakekeeper expects the warehouse *name* here (not an s3:// URI)
  ICEBERG_WAREHOUSE: "seaweedfs"
  # Base location where tables will be created inside the warehouse bucket/prefix
  ICEBERG_WAREHOUSE_LOCATION: "s3://iceberg/warehouse"

  # S3 (SeaweedFS) for Iceberg warehouse
  S3_ENDPOINT: "http://seaweedfs-s3.default.svc.cluster.local:8333"
  S3_REGION: "us-east-1"

  # Improve compatibility with S3-compatible endpoints
  AWS_S3_ADDRESSING_STYLE: "path"
  AWS_EC2_METADATA_DISABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quix-streams-service
  namespace: airflow
  labels:
    app: quix-streams-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quix-streams-service
  template:
    metadata:
      labels:
        app: quix-streams-service
    spec:
      containers:
        - name: quix-streams-service
          image: quix-streams-service:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: quix-streams-service-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-postgresql
                  key: postgres-password
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3
                  key: access-key
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3
                  key: secret-key
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
